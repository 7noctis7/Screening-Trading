# Séries macro à ingérer (FRED/ALFRED), point-in-time. Délais indicatifs.
# Régime composite : combiner VIX + macro → phase du cycle + risk-on/off.
series:
  - { id: T10Y2Y,  name: "Courbe 2s10s",         theme: rates,      freq: daily }
  - { id: ISM,     name: "ISM Manufacturier",    theme: growth,     freq: monthly, lag_days: 1 }
  - { id: UNRATE,  name: "Taux de chomage",      theme: employment, freq: monthly, lag_days: 5 }
  - { id: CPIAUCSL,name: "CPI",                   theme: inflation,  freq: monthly, lag_days: 13 }
  - { id: PCEPILFE,name: "PCE core",             theme: inflation,  freq: monthly, lag_days: 28 }
  - { id: PAYEMS,  name: "Non-Farm Payrolls",    theme: employment, freq: monthly, lag_days: 5 }
  - { id: FEDFUNDS,name: "Taux directeur Fed",   theme: rates,      freq: monthly }
  - { id: VIXCLS,  name: "VIX",                  theme: risk,       freq: daily }
  - { id: M2SL,    name: "Masse monetaire M2",   theme: liquidity,  freq: monthly, lag_days: 14 }
international:   # FMI/OCDE/BM/Eurostat/BCE → croissance/inflation par pays (allocation pays/forex)
  enabled: false
