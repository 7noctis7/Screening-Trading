name: Rebalancement paper cloud (Mac éteint, 0 €)

# Réplique le portefeuille modèle chez Alpaca PAPER chaque jour de bourse, même Mac éteint.
# Idempotent : si le launchd du Mac a déjà rebalancé (ou l'inverse), le second run voit des
# deltas ~0 et n'envoie rien. Journal (features + round-trips) persisté sur un dataset HF PRIVÉ.
#
# SÉCURITÉ (garde-fous CLAUDE.md) :
#   - Alpaca est TOUJOURS paper (AlpacaBroker force paper=True) → aucun ordre réel possible ;
#   - QUANT_NO_CRYPTO_LIVE=1 + aucune clé Bitmart fournie → crypto 100 % neutralisée ;
#   - secrets chiffrés GitHub Actions (jamais dans le code, repo public sans clé en clair) ;
#   - sans secrets Alpaca → le run s'arrête proprement (aucun défaut dangereux).
#
# Secrets à créer (Settings → Secrets and variables → Actions) :
#   ALPACA_API_KEY / ALPACA_API_SECRET  (clés du compte PAPER Alpaca)
#   HF_TOKEN  (optionnel mais recommandé : persistance du journal sur HF privé)

on:
  workflow_dispatch:
  schedule:
    - cron: "35 14 * * 1-5"   # 14:35 UTC = 10:35 ET été / 9:35 ET hiver → marché US ouvert

permissions:
  contents: read

concurrency:
  group: paper-live
  cancel-in-progress: false   # jamais interrompre un rebalancement en cours

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Gate secrets (sortie propre si non configuré)
        env:
          AK: ${{ secrets.ALPACA_API_KEY }}
        run: |
          if [ -z "$AK" ]; then
            echo "::warning::ALPACA_API_KEY absent — runner cloud non configuré, rien à faire."
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Setup Python
        if: env.skip != '1'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Dépendances
        if: env.skip != '1'
        run: |
          python -m pip install -U pip
          pip install -e ".[data,quant,api]" -c constraints.txt

      - name: Cache OHLCV (socle HF public) + top-up prix du jour
        if: env.skip != '1'
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
        run: |
          python scripts/hf_cache.py pull || true
          python scripts/ingest_prices.py --daily || true

      - name: Journal ← HF privé (round-trips accumulés)
        if: env.skip != '1'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/hf_journal.py pull

      - name: Rebalancement Alpaca PAPER (réconciliation + journal)
        if: env.skip != '1'
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          QUANT_NO_CRYPTO_LIVE: "1"   # ceinture+bretelles : aucune clé Bitmart de toute façon
          QUANT_NO_LLM: "1"
          # Alertes CRITICAL hors-bande (audit 07/15 F2) : sans ces secrets, les échecs
          # d'ordre finissaient en ConsoleSink dans un log Actions que personne ne lit.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # FAIL-LOUD : run_live sort ≠ 0 si broker mort / positions illisibles → job ROUGE
        # (l'ancien run restait vert avec une clé Alpaca invalide, pour toujours).
        run: python scripts/run_live.py --live --yes

      - name: Journal + equity → HF privé (persistance, courbe du RDV 06/08)
        if: env.skip != '1' && always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/hf_journal.py push

      - name: Alerte Telegram si le run est ROUGE (fail-loud hors-bande)
        if: failure()
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG" ] && [ -n "$CHAT" ]; then
            curl -s "https://api.telegram.org/bot${TG}/sendMessage" \
              -d chat_id="$CHAT" \
              -d text="🔴 Runner paper cloud EN ÉCHEC : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >/dev/null
          else
            echo "::warning::Run rouge et pas de TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID — personne ne sera notifié hors GitHub."
          fi
