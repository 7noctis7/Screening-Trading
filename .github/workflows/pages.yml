name: Déploiement PWA (GitHub Pages — front complet, données réelles, gratuit)

# Publie le VRAI front Next.js (parité `make start`) en statique sur GitHub Pages, avec des données
# RÉELLES récupérées gratuitement dans le build (yfinance / SEC EDGAR). Aucune YAHOO.db privée, Mac
# éteint. Rafraîchi chaque nuit. Univers borné par config/mobile_universe.csv (watchlist + top 200).
# NB : le nom du compte n'est jamais codé en dur ici — l'URL Pages suit automatiquement le compte.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "30 5 * * 1-6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NEXT_PUBLIC_BASE_PATH: /Screening-Trading
  QUANT_MAX_REPORTS: "60"
  QUANT_HISTORY_DAYS: "4015"   # ~11 ans → courbes & journaux depuis ~2015
  QUANT_FUND_MAX: "1200"       # couvre tout l'univers actions (pas de plafond fondamentaux)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Dépendances Python
        run: |
          python -m pip install -U pip
          pip install -e ".[data,quant,api]"

      - name: Dépendances web
        run: cd apps/web && (npm ci || npm install)

      - name: Univers mobile (watchlist + top 200 si présent)
        run: |
          if [ -f config/mobile_universe.csv ]; then
            echo "QUANT_UNIVERSE=${GITHUB_WORKSPACE}/config/mobile_universe.csv" >> "$GITHUB_ENV"
          fi

      - name: Cache OHLCV depuis Hugging Face (public, sans token — socle reproductible)
        run: |
          # Repart d'un cache versionné → indépendant du rate-limit yfinance. No-op si dataset vide.
          python scripts/hf_cache.py pull || true

      - name: Ingestion des prix RÉELS (yfinance — top-up best-effort)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
        run: |
          # Complète le cache HF (historique 2015) ; idempotent (INSERT OR IGNORE).
          python scripts/ingest_prices.py --since 2015-01-01 || true
          python scripts/ingest_crypto.py --days 4015 || true

      - name: Contrôle qualité des données (audit PwC — rapport visible)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
        run: |
          # Rapport de complétude/exactitude/PIT. Non bloquant (yfinance flaky en CI) ; pour gater
          # dur, remplacer par `--strict` (exit≠0 si anomalie CRITIQUE).
          python scripts/data_audit.py || true

      - name: Gate contrats OHLCV (#10 — bloquant sur l'intégrité)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
        run: |
          # Échoue le build si une barre viole l'intégrité (close≤0, high<low, volume<0…).
          # Ne bloque PAS sur l'absence de données (gérée séparément) → safe vs rate-limit yfinance.
          python scripts/contracts_check.py

      - name: Construire le site (front Next.js statique + données réelles)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
          QUANT_FUND: "yf"
          QUANT_NEWS: "0"
          QUANT_PREDMKT: "1"        # marchés de prédiction (Kalshi/Polymarket, sans clé) en ligne
          QUANT_ONCHAIN: "1"        # fondamentaux on-chain crypto (CoinGecko/DefiLlama, sans clé)
        run: python scripts/build_static_site.py

      - name: Gate publication (andon — échec ROUGE si site vide ou périmé)
        run: python scripts/check_build.py site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
