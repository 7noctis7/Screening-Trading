name: Déploiement PWA (GitHub Pages, données réelles, gratuit)

# Publie le terminal autonome (PWA installable sur téléphone, hors-ligne) sur GitHub Pages.
# Les données RÉELLES sont récupérées gratuitement dans le build (yfinance / SEC EDGAR) — aucune
# YAHOO.db privée n'est utilisée, et le Mac n'a pas besoin d'être allumé. Rafraîchi chaque nuit.

on:
  workflow_dispatch:                 # bouton « Run workflow » manuel
  push:
    branches: [main]
    paths: ["apps/**", "packages/**", "scripts/**", ".github/workflows/pages.yml"]
  schedule:
    - cron: "30 5 * * 1-6"           # tous les jours ouvrés ~05h30 UTC (après clôture US)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: |
          python -m pip install -U pip
          pip install -e ".[data,quant]"
      - name: Définir l'univers mobile (watchlist + top 200 si présent)
        run: |
          if [ -f config/mobile_universe.csv ]; then
            echo "QUANT_UNIVERSE=${{ github.workspace }}/config/mobile_universe.csv" >> "$GITHUB_ENV"
            echo "Univers mobile borné : $(($(wc -l < config/mobile_universe.csv)-1)) actifs."
          else
            echo "Pas de config/mobile_universe.csv → univers complet (lance 'make watchlist' en local)."
          fi
      - name: Ingestion des prix RÉELS (yfinance, gratuit — best-effort)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
        run: |
          python scripts/ingest_prices.py --since "$(date -u -d '18 months ago' +%Y-%m-%d)" || true
          python scripts/ingest_crypto.py || true
      - name: Construire le site (PWA, données réelles si dispo)
        env:
          QUANT_PRICE_DB: ${{ github.workspace }}/data/market.db
          QUANT_FUND: "yf"            # fondamentaux réels via yfinance
          QUANT_NEWS: "0"             # pas de RSS en CI (rapide)
        run: python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
